name: Docker PostGIS CI

on:
  push:
    tags:
      - v*

defaults:
  run:
    shell: bash

jobs:

  make-docker-images:
    strategy:
      matrix:
        runner-platform: ['ubuntu-24.04', 'ubuntu-24.04-arm']
        postgres: [14, 15, 16, 17]
        postgis: ['3.5']
        variant: [default]
        include:
          - postgres: 18
            postgis: master
            variant: default
            runner-platform: 'ubuntu-24.04'
          - postgres: 17
            postgis: master
            variant: default
            runner-platform: 'ubuntu-24.04'
          - postgres: 18
            postgis: master
            variant: default
            runner-platform: 'ubuntu-24.04-arm'
          - postgres: 17
            postgis: master
            variant: default
            runner-platform: 'ubuntu-24.04-arm'
          - postgres: 17
            postgis: '3.6'
            variant: alpine
            runner-platform: 'ubuntu-24.04'
          - postgres: 17
            postgis: '3.6'
            variant: alpine
            runner-platform: 'ubuntu-24.04-arm'
          - postgres: 18
            postgis: '3.6'
            variant: alpine
            runner-platform: 'ubuntu-24.04'
          - postgres: 18
            postgis: '3.6'
            variant: alpine
            runner-platform: 'ubuntu-24.04-arm'
          - postgres: 18
            postgis: '3.6'
            variant: default
            runner-platform: 'ubuntu-24.04'
          - postgres: 18
            postgis: '3.6'
            variant: default
            runner-platform: 'ubuntu-24.04-arm'

    name: ${{ matrix.postgres }}-${{ matrix.postgis }}-${{ matrix.variant }} ${{ matrix.runner-platform }} - Build Docker image
    runs-on: ${{ matrix.runner-platform }}
    continue-on-error: ${{ matrix.postgis == 'master' }}
    env:
      VERSION: ${{ matrix.postgres }}-${{ matrix.postgis }}
      VARIANT: ${{ matrix.variant }}
      DOCKER_APT_PKG_VER: '5:29.2.1-1~ubuntu.24.04~noble'

    steps:
    - name: Checkout source
      uses: actions/checkout@v4
      
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to dockerhub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

    - name: Build and Push docker image for ${{ env.VERSION }} ${{ env.VARIANT }} to dockerhub
      uses: docker/build-push-action@v5
      env:
        DOCKERFILE_PATH: ${{ matrix.variant == 'default' && format('./{0}', env.VERSION) || format('./{0}/{1}', env.VERSION, matrix.variant) }}
        DOCKER_TAG: ${{ matrix.variant == 'default' && env.VERSION || format('{0}-{1}', env.VERSION,matrix.variant) }}
      with:
        context: ${{ env.DOCKERFILE_PATH }}
        file: ${{ env.DOCKERFILE_PATH }}/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/postgis:${{ env.DOCKER_TAG }}
        # cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/postgis:${{ env.DOCKER_TAG }}-cache
        # cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/postgis:${{ env.DOCKER_TAG }}-cache,mode=max

